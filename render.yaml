services:
  - type: web
    name: wayaswheel-backend
    runtime: node
    plan: free
    buildCommand: cd server && npm install
    startCommand: cd server && node index.js
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://wayaswheelofffate.eu
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: CLOUD_LLM_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
